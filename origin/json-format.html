<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="云河工具站 - JSON格式化工具，支持语法高亮、压缩、校验等功能，适配移动端设备">
  <title>JSON格式化工具 - 云河工具站</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Font Awesome 图标 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Tailwind 配置：自定义主题色 + 暗黑模式 -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#4f46e5',
            'primary-light': '#6366f1',
            secondary: '#10b981',
          },
        },
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .card-hover {
        @apply transition-all duration-300 hover:-translate-y-1 hover:shadow-lg hover:border-primary;
      }
      .nav-active {
        @apply bg-primary text-white;
      }
      .tool-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.5rem;
      }
      
      /* JSON 语法高亮 */
      .json-string { color: #0f9d58; }
      .json-number { color: #db4437; }
      .json-boolean { color: #ff6d01; }
      .json-null { color: #757575; }
      .json-key { color: #4285f4; font-weight: bold; }
      .json-punctuation { color: #202124; }
      
      /* 暗黑模式下的 JSON 高亮 */
      .dark .json-string { color: #67e867; }
      .dark .json-number { color: #f87171; }
      .dark .json-boolean { color: #fb923c; }
      .dark .json-null { color: #9ca3af; }
      .dark .json-key { color: #60a5fa; }
      .dark .json-punctuation { color: #e5e7eb; }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen transition-colors">

  <div class="flex flex-col min-h-screen">
    <!-- 移动端顶部导航 -->
    <header class="lg:hidden bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 p-4 sticky top-0 z-40">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2 text-primary text-lg font-bold">
          <i class="fa-solid fa-tools text-xl"></i>
          <span>云河工具站</span>
        </div>
        <button id="mobileMenuBtn" class="w-10 h-10 rounded-lg bg-slate-100 dark:bg-slate-700 flex items-center justify-center">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </header>

    <div class="flex flex-1">
      <!-- 侧边栏 -->
      <aside id="sidebar" class="fixed left-0 top-0 h-screen w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 p-6 overflow-y-auto transform -translate-x-full lg:translate-x-0 transition-transform z-50">
        <div class="flex items-center gap-2 text-primary text-xl font-bold pb-5 border-b border-slate-200 dark:border-slate-700 mb-6">
          <i class="fa-solid fa-tools text-2xl"></i>
          <span>云河工具站</span>
        </div>

        <p class="text-xs uppercase text-slate-500 dark:text-slate-400 mb-2 mt-4 tracking-wider">主导航</p>
        <ul class="space-y-1 mb-6">
          <li><a href="#" class="nav-active flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm"><i class="w-5 text-center fa-solid fa-home"></i>全部工具</a></li>
          <li><a href="#" class="flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm hover:bg-primary hover:text-white transition-colors"><i class="w-5 text-center fa-solid fa-star"></i>我的收藏</a></li>
          <li><a href="#" class="flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm hover:bg-primary hover:text-white transition-colors"><i class="w-5 text-center fa-solid fa-history"></i>最近使用</a></li>
        </ul>

        <p class="text-xs uppercase text-slate-500 dark:text-slate-400 mb-2 mt-4 tracking-wider">工具分类</p>
        <ul class="space-y-1">
          <li><a href="#" class="flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm hover:bg-primary hover:text-white transition-colors"><i class="w-5 text-center fa-solid fa-calculator"></i>计算转换</a></li>
          <li><a href="#" class="flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm hover:bg-primary hover:text-white transition-colors"><i class="w-5 text-center fa-solid fa-code"></i>开发工具</a></li>
          <li><a href="#" class="flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm hover:bg-primary hover:text-white transition-colors"><i class="w-5 text-center fa-solid fa-image"></i>图片处理</a></li>
          <li><a href="#" class="flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm hover:bg-primary hover:text-white transition-colors"><i class="w-5 text-center fa-solid fa-text-height"></i>文本处理</a></li>
          <li><a href="#" class="flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm hover:bg-primary hover:text-white transition-colors"><i class="w-5 text-center fa-solid fa-lock"></i>加密安全</a></li>
        </ul>
      </aside>

      <!-- 主内容区 -->
      <main class="flex-1 lg:ml-64 p-4 md:p-6">
        <!-- 桌面端顶部栏 -->
        <div class="hidden lg:flex flex-wrap items-center justify-between gap-4 mb-8">
          <button id="menuBtn" class="w-11 h-11 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center">
            <i class="fa-solid fa-bars"></i>
          </button>

          <div class="relative flex-1 max-w-md">
            <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" placeholder="搜索工具（如：JSON格式化、单位换算、图片压缩）" 
              class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-sm outline-none">
          </div>

          <button id="themeToggle" class="w-11 h-11 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center">
            <i class="fa-solid fa-moon dark:hidden"></i>
            <i class="fa-solid fa-sun hidden dark:inline-block"></i>
          </button>
        </div>

        <!-- 移动端顶部栏 -->
        <div class="lg:hidden flex items-center gap-3 mb-6">
          <div class="relative flex-1">
            <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" placeholder="搜索工具..." 
              class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-sm outline-none text-sm">
          </div>
          
          <button id="mobileThemeToggle" class="w-10 h-10 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center">
            <i class="fa-solid fa-moon dark:hidden"></i>
            <i class="fa-solid fa-sun hidden dark:inline-block"></i>
          </button>
        </div>

        <!-- JSON格式化工具卡片 -->
        <div class="bg-white dark:bg-slate-800 rounded-xl p-5 border border-slate-200 dark:border-slate-700 shadow mb-8">
          <div class="flex items-center gap-2 mb-5">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-primary to-primary-light flex items-center justify-center text-white text-lg">
              <i class="fa-solid fa-code"></i>
            </div>
            <h2 class="text-xl font-bold">JSON格式化工具</h2>
          </div>
          
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- 输入区域 -->
            <div>
              <div class="flex justify-between items-center mb-2">
                <label class="font-medium text-slate-700 dark:text-slate-300">输入JSON</label>
                <button id="clearInput" class="text-sm text-red-500 hover:text-red-700 dark:hover:text-red-400">
                  <i class="fa-solid fa-trash mr-1"></i>清空
                </button>
              </div>
              <textarea id="inputJson" rows="15" 
                class="w-full p-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 shadow-sm outline-none focus:ring-2 focus:ring-primary focus:border-transparent resize-none font-mono text-sm"
                placeholder='请输入JSON数据，例如：{"name": "张三", "age": 30, "city": "北京"}'></textarea>
              
              <div class="flex flex-wrap gap-3 mt-4">
                <button id="formatBtn" class="px-4 py-2.5 bg-primary text-white rounded-lg hover:bg-primary-light transition-colors flex items-center">
                  <i class="fa-solid fa-indent mr-2"></i>格式化
                </button>
                <button id="compressBtn" class="px-4 py-2.5 bg-secondary text-white rounded-lg hover:bg-opacity-90 transition-colors flex items-center">
                  <i class="fa-solid fa-compress mr-2"></i>压缩
                </button>
                <button id="validateBtn" class="px-4 py-2.5 bg-slate-600 text-white rounded-lg hover:bg-slate-700 transition-colors flex items-center">
                  <i class="fa-solid fa-check mr-2"></i>验证
                </button>
              </div>
            </div>
            
            <!-- 输出区域 -->
            <div>
              <div class="flex justify-between items-center mb-2">
                <label class="font-medium text-slate-700 dark:text-slate-300">格式化结果</label>
                <button id="copyOutput" class="text-sm text-primary hover:text-primary-light flex items-center">
                  <i class="fa-solid fa-copy mr-1"></i>复制
                </button>
              </div>
              <div id="outputJson" 
                class="w-full p-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 shadow-sm min-h-[240px] max-h-[400px] overflow-auto font-mono text-sm whitespace-pre-wrap break-all">
                <!-- 格式化后的JSON将显示在这里 -->
              </div>
              
              <div class="mt-4">
                <div class="flex items-center gap-2 mb-2">
                  <i class="fa-solid fa-info-circle text-slate-500 dark:text-slate-400"></i>
                  <span class="text-sm text-slate-600 dark:text-slate-400">状态信息</span>
                </div>
                <div id="statusInfo" class="text-sm text-slate-600 dark:text-slate-400 bg-slate-50 dark:bg-slate-700 p-3 rounded-lg">
                  等待输入...
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 工具说明 -->
        <div class="bg-white dark:bg-slate-800 rounded-xl p-5 border border-slate-200 dark:border-slate-700 shadow mb-8">
          <h3 class="text-lg font-semibold mb-3 flex items-center gap-2">
            <i class="fa-solid fa-lightbulb text-primary"></i>
            使用说明
          </h3>
          <ul class="space-y-2 text-sm text-slate-600 dark:text-slate-400">
            <li class="flex items-start gap-2">
              <i class="fa-solid fa-check-circle text-green-500 mt-0.5"></i>
              <span>支持JSON格式化、压缩和语法验证</span>
            </li>
            <li class="flex items-start gap-2">
              <i class="fa-solid fa-check-circle text-green-500 mt-0.5"></i>
              <span>格式化后自动语法高亮，不同数据类型显示不同颜色</span>
            </li>
            <li class="flex items-start gap-2">
              <i class="fa-solid fa-check-circle text-green-500 mt-0.5"></i>
              <span>支持一键复制格式化结果</span>
            </li>
            <li class="flex items-start gap-2">
              <i class="fa-solid fa-check-circle text-green-500 mt-0.5"></i>
              <span>完全响应式设计，完美适配移动端设备</span>
            </li>
          </ul>
        </div>

        <!-- 页脚 -->
        <footer class="mt-12 pt-6 border-t border-slate-200 dark:border-slate-700 text-center text-sm text-slate-500 dark:text-slate-400">
          <p>&copy; 2024 云河工具站 - 免费在线工具集合</p>
          <p class="mt-1">随时随地为您提供便捷的工具服务</p>
        </footer>
      </main>
    </div>
  </div>

  <script>
    // 侧边栏切换
    const menuBtn = document.getElementById('menuBtn');
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const sidebar = document.getElementById('sidebar');
    
    function toggleSidebar() {
      sidebar.classList.toggle('-translate-x-full');
    }
    
    menuBtn?.addEventListener('click', toggleSidebar);
    mobileMenuBtn?.addEventListener('click', toggleSidebar);

    // 暗黑模式切换
    const themeToggle = document.getElementById('themeToggle');
    const mobileThemeToggle = document.getElementById('mobileThemeToggle');
    
    function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
    }
    
    themeToggle?.addEventListener('click', toggleDarkMode);
    mobileThemeToggle?.addEventListener('click', toggleDarkMode);

    // 记忆暗黑模式
    if (localStorage.getItem('darkMode') === 'true') {
      document.documentElement.classList.add('dark');
    }

    // 导航点击效果
    document.querySelectorAll('a[href="#"]').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('a[href="#"]').forEach(l => l.classList.remove('nav-active'));
        e.target.closest('a')?.classList.add('nav-active');
      });
    });
    
    // 点击侧边栏外区域关闭侧边栏
    document.addEventListener('click', (e) => {
      if (!sidebar.contains(e.target) && 
          !mobileMenuBtn?.contains(e.target) &&
          !menuBtn?.contains(e.target)) {
        sidebar.classList.add('-translate-x-full');
      }
    });

    // JSON格式化工具功能
    const inputJson = document.getElementById('inputJson');
    const outputJson = document.getElementById('outputJson');
    const formatBtn = document.getElementById('formatBtn');
    const compressBtn = document.getElementById('compressBtn');
    const validateBtn = document.getElementById('validateBtn');
    const clearInput = document.getElementById('clearInput');
    const copyOutput = document.getElementById('copyOutput');
    const statusInfo = document.getElementById('statusInfo');

    // 语法高亮函数
    function syntaxHighlight(json) {
      if (typeof json !== 'string') return '';
      
      return json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function(match) {
          let cls = 'json-punctuation'; // 默认标点符号
          
          if (/^"/.test(match)) {
            if (/:$/.test(match)) {
              cls = 'json-key'; // 键名
            } else {
              cls = 'json-string'; // 字符串值
            }
          } else if (/true|false/.test(match)) {
            cls = 'json-boolean'; // 布尔值
          } else if (/null/.test(match)) {
            cls = 'json-null'; // null值
          } else if (/^-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?$/.test(match)) {
            cls = 'json-number'; // 数字
          }
          
          return '<span class="' + cls + '">' + match + '</span>';
        });
    }

    // 格式化JSON
    function formatJson() {
      try {
        const input = inputJson.value.trim();
        if (!input) {
          statusInfo.textContent = '请输入JSON数据';
          return;
        }
        
        const parsed = JSON.parse(input);
        const formatted = JSON.stringify(parsed, null, 2);
        outputJson.innerHTML = syntaxHighlight(formatted);
        statusInfo.textContent = '格式化成功！';
      } catch (error) {
        statusInfo.textContent = `格式化失败: ${error.message}`;
      }
    }

    // 压缩JSON
    function compressJson() {
      try {
        const input = inputJson.value.trim();
        if (!input) {
          statusInfo.textContent = '请输入JSON数据';
          return;
        }
        
        const parsed = JSON.parse(input);
        const compressed = JSON.stringify(parsed);
        outputJson.innerHTML = syntaxHighlight(compressed);
        statusInfo.textContent = '压缩成功！';
      } catch (error) {
        statusInfo.textContent = `压缩失败: ${error.message}`;
      }
    }

    // 验证JSON
    function validateJson() {
      try {
        const input = inputJson.value.trim();
        if (!input) {
          statusInfo.textContent = '请输入JSON数据';
          return;
        }
        
        JSON.parse(input);
        statusInfo.textContent = 'JSON格式有效！';
      } catch (error) {
        statusInfo.textContent = `JSON格式无效: ${error.message}`;
      }
    }

    // 清空输入
    function clearInputField() {
      inputJson.value = '';
      outputJson.innerHTML = '';
      statusInfo.textContent = '已清空';
    }

    // 复制输出
    async function copyOutputText() {
      try {
        const text = outputJson.innerText || outputJson.textContent;
        await navigator.clipboard.writeText(text);
        statusInfo.textContent = '已复制到剪贴板！';
      } catch (err) {
        statusInfo.textContent = '复制失败，请手动复制';
      }
    }

    // 事件监听器
    formatBtn.addEventListener('click', formatJson);
    compressBtn.addEventListener('click', compressJson);
    validateBtn.addEventListener('click', validateJson);
    clearInput.addEventListener('click', clearInputField);
    copyOutput.addEventListener('click', copyOutputText);

    // 输入框实时验证（可选）
    inputJson.addEventListener('input', () => {
      if (inputJson.value.trim() === '') {
        statusInfo.textContent = '等待输入...';
        outputJson.innerHTML = '';
      }
    });
  </script>
</body>
</html>
